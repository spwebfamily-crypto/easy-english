    <!-- Splash Screen -->
    <div id="splash" class="splash-screen">

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 🚀 CONTROLE DO SPLASH SCREEN
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash');
        if (!splash) return;
        
        // Garante que o splash fique visível por pelo menos 1.5s para branding
        // e então faz o fade out suave
        const minTime = 1500;
        const loadTime = Date.now() - window.performance.timing.navigationStart;
        const delay = Math.max(0, minTime - loadTime);

        setTimeout(() => {
          splash.classList.add('is-hidden');
          setTimeout(() => splash.remove(), 800); // Remove do DOM após o fade
        }, delay);
      });
    </script>
